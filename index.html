<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <!-- bootstrap -->
    <link rel="stylesheet" href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- stylesheet -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    

    <div class="container">
        <div class="display">
            <h2>Scores:</h2> 
            <p id="playerScoreDisplay">Player</p>
            <p id="computerScoreDisplay">Computer</p>           
        </div><!--./display-->
        <div class="game__screen">
            <div class="choices__wrapper">
                <i class="fa-solid fa-hand-back-fist" id="rock"></i>
                <i class="fa-solid fa-hand" id="paper"></i>
                <i class="fa-solid fa-hand-scissors" id="scissors"></i>
            </div><!--./choices__wrapper-->
    
            <div class="buttons__wrapper">
                <button type="button" class="btn btn-danger" id="btnReset">Resetar Jogo</button>
            </div><!--./buttons__wrapper-->
        </div><!--./game__screen-->
    </div><!--./container-->

    <!-- booststrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <!-- script -->
    <script src="js/script.js"></script>
</body>
</html>
